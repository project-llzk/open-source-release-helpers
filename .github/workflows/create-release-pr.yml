name: Create Release PR

on:
  workflow_call:

jobs:
  create-release-files:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}
      branch: ${{ steps.branch_name.outputs.name }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Locate pre-release branch
        id: branch_name
        run: |
          git config user.name ${{ github.actor	}}
          git config user.email ${{ github.actor }}@users.noreply.github.com
          git fetch
          BRANCH_NAME=$(git branch -a | grep "pre-release")
          BRANCH=${BRANCH_NAME##*/}
          echo $BRANCH
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Check out repository code (pre-release branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH }}
          persist-credentials: true

      - name: Check out release helper code
        uses: actions/checkout@v4
        with:
          # ${{ github.action_repository }} ends up pointing to actions/checkout@v4
          repository: project-llzk/open-source-release-helpers
          path: release_helpers
          persist-credentials: false

      - name: Locate release version
        id: release_version
        run: |
          echo "RELEASE_VERSION=$( echo ${{ env.BRANCH }} | cut -d "-" -f 1 )" >> $GITHUB_ENV
          RELEASE_VERSION=$( echo ${{ env.BRANCH }} | cut -d "-" -f 1 )
          echo "Release version '${RELEASE_VERSION}'"
          echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # caching pip dependencies

      - name: Install python dependencies
        run: |
          pip install --upgrade pip && pip install -r $GITHUB_WORKSPACE/release_helpers/requirements.txt

      - name: Update date & append to top of CHANGELOG.md
        run: |
          $GITHUB_WORKSPACE/release_helpers/scripts/prependReleaseChanges.sh
          $GITHUB_WORKSPACE/release_helpers/scripts/removePreReleaseFiles.sh
          ls -lR changelogs || echo "changelogs directory no longer exists"

      - name: Commit changes
        id: commit
        run: |
          # If the scripts above made no changes, then there is no need to commit.
          # This can happen if the pre-release branch was already prepped for release
          # but the workflow did not complete and is run again.
          git diff --cached --quiet && git diff --quiet || git commit -am "Finalize release ${{ env.RELEASE_VERSION }}"
          git push

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            // Check if a PR already exists for this branch to make this step idempotent
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${{ env.BRANCH }}`,
              base: 'main',
              state: 'open'
            });
            if (existing.data.length === 1) {
              let prNumber = existing.data[0].number;
              console.log(`PR already exists: #${prNumber}`);
            } else {
              const result = await github.rest.pulls.create({
                title: 'Release ${{ env.RELEASE_VERSION }}',
                owner,
                repo,
                head: '${{ env.BRANCH }}',
                base: 'main',
                body: [
                  'This PR is auto-generated by',
                  '[actions/github-script](https://github.com/actions/github-script).'
                ].join('\n')
              });
              github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: result.data.number,
                labels: ['release', '${{ env.RELEASE_VERSION }}']
              });
            }

      - name: Auto approve PR
        env:
          # Need a PAT because the default token will result in "Can not approve your own pull request"
          GH_TOKEN: ${{ secrets.RELEASE_APPROVER }}
        run: |
          # Retry up to 5 times waiting for the PR to become available
          PR_NUMBER=""
          for i in 1 2 3 4 5; do
            echo "Attempt ${i}: looking for release PR..."
            sleep 1
            PR_NUMBER=$(gh pr list --label "release" --label ${{ env.RELEASE_VERSION }} | cut -f 1)
            if [ -n "${PR_NUMBER}" ]; then
              break
            fi
            echo "PR not found yet. Waiting..."
            sleep 4
          done
          if [ -z "${PR_NUMBER}" ]; then
            echo "Could not locate the PR number to auto approve after 5 attempts. Exiting."
            exit 1
          fi
          gh pr list --label "release" --label ${{ env.RELEASE_VERSION }}
          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_ENV
          echo "Release PR: ${PR_NUMBER}"
          gh pr review --approve ${PR_NUMBER}

      - name: Wait for required checks to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # by default github actions have set -e. But the gh pr check exits with 1 if there are no checks
          set +e
          gh pr checks --watch --fail-fast --required ${{ env.PR_NUMBER }} 2>error.txt
          exit_code=$?
          set -e
          echo "*** ERROR OUTPUT ***"
          cat error.txt
          echo "********************"
          if [ $exit_code -ne 0 ]
          then
            error_text=$(cat error.txt)
            if [[ ! "$error_text" == *"no checks reported"* ]]; then
              exit $exit_code
            fi
          fi

      - name: Merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ env.PR_NUMBER }} --squash
